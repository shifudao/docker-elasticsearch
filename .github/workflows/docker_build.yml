name: Docker Build and Publish

# Publish multi-arch images to Docker Hub, GHCR, and Quay.io.
# The version is sourced from Dockerfile's ARG ELASTICSEARCH_VERSION (single source of truth),
# and tag rules match publish_images.sh: 2.1.2 / 2.1 / 2 / latest.

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "config/**"
      - "docker-entrypoint.sh"
      - "elasticsearch-analysis-ik-1.7.0.tar.xz"
      - ".github/workflows/docker_build.yml"
  workflow_dispatch:

env:
  PLATFORMS: linux/amd64,linux/arm64
  IMAGE_NAME: elasticsearch

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract version from Dockerfile
        id: version
        run: |
          set -euo pipefail
          VERSION="$(grep -oP '^ARG ELASTICSEARCH_VERSION=\K\S+' Dockerfile)"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version does not match semver format: $VERSION"
            exit 1
          fi
          # 2.1.2 -> 2.1 / 2, matching publish_images.sh generate_tags
          MAJOR="${VERSION%%.*}"
          MAJOR_MINOR="${VERSION%.*}"
          {
            echo "full=$VERSION"
            echo "major=$MAJOR"
            echo "major_minor=$MAJOR_MINOR"
          } >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Three registries; metadata-action generates every tag for each image
          images: |
            ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            quay.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.full }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_IO_USERNAME }}
          password: ${{ secrets.QUAY_IO_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          push: true
          pull: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
