name: Update Docker Hub Description

# Sync README.md to the Docker Hub repository Overview.
# Requires secrets: DOCKERHUB_USERNAME, DOCKERHUB_PASSWORD (Access Token).

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/docker_hub_description.yml"
  workflow_dispatch:

env:
  DOCKER_REPOSITORY: ${{ github.repository_owner }}/elasticsearch

jobs:
  docker-hub-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ env.DOCKER_REPOSITORY }}
          short-description: ${{ github.event.repository.description }}
